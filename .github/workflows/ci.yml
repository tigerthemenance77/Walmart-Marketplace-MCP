name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Run tests
        run: npm test
      - name: Credential leak check
        run: |
          if grep -r "client_id\|client_secret\|access_token" dist/ 2>/dev/null | grep -v "//.*credential\|# credential"; then
            echo "CREDENTIAL MATERIAL DETECTED in dist/"
            exit 1
          fi
          echo "Credential check passed ✅"
